ecommerce_metrics:
  target: local
  outputs:
    local:
      type: duckdb
      path: ecommerce_local.duckdb
      threads: 4

    motherduck:
      type: duckdb
      # Database name defaults to ecommerce_test_db; override with the MD_DATABASE
      # env var (the flight-dbt-metricflow Flight sets it from config).
      path: "md:{{ env_var('MD_DATABASE', 'ecommerce_test_db') }}"
      threads: 4
      settings:
        # MotherDuck token will be picked up from environment variable
        # Set MOTHERDUCK_TOKEN env var before running
